                      animation: spin 1s linear infinite;
                  }
                  
                  @keyframes spin {
                      to { transform: rotate(360deg); }
                  }
              </style>
          </head>
          <body>
              <div class="bg-animation"></div>
              
              <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">
                  <span id="theme-icon">🌙</span>
              </button>
              
              <div class="hero">
                  <div class="hero-content">
                      <h1>👨‍🏫 Riyaaz Sir's Portal</h1>
                      <p>Your gateway to success. Download premium study materials and ace your exams!</p>
                      <div class="hero-stats">
                          <div class="stat">
                              <div class="stat-number" id="total-papers">0</div>
                              <div class="stat-label">Papers</div>
                          </div>
                          <div class="stat">
                              <div class="stat-number" id="total-subjects">0</div>
                              <div class="stat-label">Subjects</div>
                          </div>
                      </div>
                  </div>
              </div>
              
              <div class="container">
                  <div class="search-section">
                      <div class="search-wrapper">
                          <span class="search-icon">🔍</span>
                          <input type="text" id="search" class="search-bar" placeholder="Search papers by name or subject..." onkeyup="filterPapers()">
                      </div>
                      <div class="filter-tags" id="filter-tags">
                          <span class="filter-tag active" data-subject="all" onclick="filterBySubject('all', this)">All Papers</span>
                      </div>
                  </div>
                  
                  <h2 class="section-title">📄 Available Papers</h2>
                  
                  <div class="grid" id="paper-grid">
                      <div class="loading">
                          <div class="spinner"></div>
                      </div>
                  </div>
              </div>
              
              <div class="footer">
                  <p>Made with ❤️ for <strong>Riyaaz Sir's Students</strong></p>
                  <p style="margin-top: 5px; font-size: 0.8rem;">© 2024 All rights reserved</p>
              </div>
              
              <script>
                  let allPapers = [];
                  let currentFilter = 'all';
                  
                  // Theme Management
                  function initTheme() {
                      const saved = localStorage.getItem('theme') || 'light';
                      document.documentElement.setAttribute('data-theme', saved);
                      updateThemeIcon(saved);
                  }
                  
                  function toggleTheme() {
                      const current = document.documentElement.getAttribute('data-theme');
                      const next = current === 'dark' ? 'light' : 'dark';
                      document.documentElement.setAttribute('data-theme', next);
                      localStorage.setItem('theme', next);
                      updateThemeIcon(next);
                  }
                  
                  function updateThemeIcon(theme) {
                      document.getElementById('theme-icon').textContent = theme === 'dark' ? '☀️' : '🌙';
                  }
                  
                  // Load Papers
                  async function loadPapers() {
                      try {
                          const res = await fetch('papers.json?t=' + Date.now());
                          allPapers = await res.json();
                          updateStats();
                          buildFilterTags();
                          renderPapers(allPapers);
                      } catch (e) {
                          document.getElementById('paper-grid').innerHTML = `
                              <div class="empty-state">
                                  <div class="empty-state-icon">📭</div>
                                  <h3>Coming Soon!</h3>
                                  <p>Papers are being uploaded. Check back later!</p>
                              </div>
                          `;
                      }
                  }
                  
                  function updateStats() {
                      const visible = allPapers.filter(p => p.visible !== false);
                      const subjects = [...new Set(visible.map(p => p.subject))];
                      document.getElementById('total-papers').textContent = visible.length;
                      document.getElementById('total-subjects').textContent = subjects.length;
                  }
                  
                  function buildFilterTags() {
                      const visible = allPapers.filter(p => p.visible !== false);
                      const subjects = [...new Set(visible.map(p => p.subject))];
                      const container = document.getElementById('filter-tags');
                      
                      container.innerHTML = `<span class="filter-tag active" data-subject="all" onclick="filterBySubject('all', this)">All Papers</span>`;
                      
                      subjects.forEach(sub => {
                          container.innerHTML += `<span class="filter-tag" data-subject="${sub}" onclick="filterBySubject('${sub}', this)">${sub}</span>`;
                      });
                  }
                  
                  function filterBySubject(subject, el) {
                      currentFilter = subject;
                      document.querySelectorAll('.filter-tag').forEach(t => t.classList.remove('active'));
                      el.classList.add('active');
                      filterPapers();
                  }
                  
                  function filterPapers() {
                      const query = document.getElementById('search').value.toLowerCase();
                      let filtered = allPapers.filter(p => p.visible !== false);
                      
                      if (currentFilter !== 'all') {
                          filtered = filtered.filter(p => p.subject === currentFilter);
                      }
                      
                      if (query) {
                          filtered = filtered.filter(p => 
                              p.name.toLowerCase().includes(query) || 
                              (p.subject && p.subject.toLowerCase().includes(query)) ||
                              (p.description && p.description.toLowerCase().includes(query))
                          );
                      }
                      
                      renderPapers(filtered);
                  }
                  
                  function isNew(timestamp) {
                      const threeDays = 3 * 24 * 60 * 60 * 1000;
                      return Date.now() - timestamp < threeDays;
                  }
                  
                  function renderPapers(papers) {
                      const grid = document.getElementById('paper-grid');
                      
                      if (papers.length === 0) {
                          grid.innerHTML = `
                              <div class="empty-state">
                                  <div class="empty-state-icon">🔍</div>
                                  <h3>No Papers Found</h3>
                                  <p>Try a different search term or filter.</p>
                              </div>
                          `;
                          return;
                      }
                      
                      grid.innerHTML = papers.map(paper => {
                          const date = new Date(paper.id).toLocaleDateString('en-US', { 
                              year: 'numeric', 
                              month: 'short', 
                              day: 'numeric' 
                          });
                          
                          return `
                              <div class="card">
                                  <div class="card-header">
                                      <span class="tag">📚 ${paper.subject || 'General'}</span>
                                      ${isNew(paper.id) ? '<span class="new-badge">✨ NEW</span>' : ''}
                                  </div>
                                  <h3 class="title">${paper.name}</h3>
                                  <p class="description">${paper.description || 'Download this sample paper to boost your preparation!'}</p>
                                  <div class="meta">
                                      <span class="meta-item">📅 ${date}</span>
                                      <span class="meta-item">📄 PDF</span>
                                  </div>
                                  <a href="${paper.link}" class="download-btn" download>
                                      <span>📥</span> Download Now
                                  </a>
                              </div>
                          `;
                      }).join('');
                  }
                  
                  // Initialize
                  initTheme();
                  loadPapers();
              </script>
          </body>
          </html>
          HTMLEOF

          # ============================================
          # CREATE admin.html (Admin Dashboard)
          # ============================================
          cat > admin.html << 'ADMINEOF'

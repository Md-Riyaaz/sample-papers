              <div class="modal" id="replace-modal">
                  <div class="modal-content">
                      <h2>🔄 Replace PDF</h2>
                      <p style="color: var(--text-muted); margin-bottom: 25px;">Upload a new PDF to replace the existing file. Students will automatically get the new version.</p>
                      <input type="hidden" id="replace-id">
                      <div class="form-group">
                          <label>Select New PDF</label>
                          <input type="file" id="replace-file" accept=".pdf">
                      </div>
                      <div class="modal-actions">
                          <button class="btn-outline" onclick="closeModal('replace-modal')">Cancel</button>
                          <button id="replace-btn" onclick="confirmReplace()">📤 Upload New PDF</button>
                      </div>
                  </div>
              </div>
              
              <!-- Status Bar -->
              <div class="status-bar" id="status-bar"></div>
              
              <script>
                  // ==========================================
                  // STATE
                  // ==========================================
                  let siteConfig = {};
                  let papersDb = [];
                  let dbSha = '';
                  let configSha = '';
                  let ghToken = '';
                  
                  const b64Encode = str => btoa(unescape(encodeURIComponent(str)));
                  const b64Decode = str => decodeURIComponent(escape(atob(str)));
                  
                  // ==========================================
                  // INITIALIZATION
                  // ==========================================
                  async function init() {
                      // Load config
                      try {
                          const res = await fetch('config.json?t=' + Date.now());
                          siteConfig = await res.json();
                      } catch (e) {
                          siteConfig = {
                              adminUsername: 'riyaazsir',
                              adminPassword: 'admin123',
                              siteName: "Riyaaz Sir's Portal",
                              siteTagline: 'Your gateway to academic excellence!',
                              githubUsername: 'rajaprogrammer',
                              repoName: 'sample-papers',
                              footerText: "Made with ❤️ for Students",
                              primaryColor: '#6366f1',
                              secondaryColor: '#ec4899'
                          };
                      }
                      
                      // Check if logged in
                      const savedSession = localStorage.getItem('admin_session');
                      if (savedSession === 'active') {
                          ghToken = localStorage.getItem('gh_token') || '';
                          showDashboard();
                      }
                  }
                  
                  init();
                  
                  // ==========================================
                  // AUTH
                  // ==========================================
                  function login() {
                      const username = document.getElementById('login-username').value.trim();
                      const password = document.getElementById('login-password').value;
                      
                      if (!username || !password) {
                          return alert('Please enter both username and password!');
                      }
                      
                      if (username === siteConfig.adminUsername && password === siteConfig.adminPassword) {
                          localStorage.setItem('admin_session', 'active');
                          ghToken = localStorage.getItem('gh_token') || '';
                          showDashboard();
                      } else {
                          alert('❌ Invalid username or password!');
                      }
                  }
                  
                  function logout() {
                      localStorage.removeItem('admin_session');
                      location.reload();
                  }
                  
                  async function showDashboard() {
                      document.getElementById('login-screen').style.display = 'none';
                      document.getElementById('dashboard').style.display = 'block';
                      
                      document.getElementById('admin-welcome').textContent = `Welcome, ${siteConfig.adminUsername}!`;
                      
                      // Load settings into form
                      loadSettingsForm();
                      
                      // Check token warning
                      updateTokenWarning();
                      
                      // Load papers
                      await fetchPapers();
                  }
                  
                  function loadSettingsForm() {
                      document.getElementById('set-gh-username').value = siteConfig.githubUsername || '';
                      document.getElementById('set-repo-name').value = siteConfig.repoName || '';
                      document.getElementById('set-gh-token').value = ghToken;
                      document.getElementById('set-admin-user').value = siteConfig.adminUsername || '';
                      document.getElementById('set-site-name').value = siteConfig.siteName || '';
                      document.getElementById('set-site-tagline').value = siteConfig.siteTagline || '';
                      document.getElementById('set-footer').value = siteConfig.footerText || '';
                      document.getElementById('set-primary-color').value = siteConfig.primaryColor || '#6366f1';
                      document.getElementById('set-primary-text').value = siteConfig.primaryColor || '#6366f1';
                      document.getElementById('set-secondary-color').value = siteConfig.secondaryColor || '#ec4899';
                      document.getElementById('set-secondary-text').value = siteConfig.secondaryColor || '#ec4899';
                  }
                  
                  function updateTokenWarning() {
                      const warning = document.getElementById('token-warning');
                      if (ghToken) {
                          warning.style.display = 'none';
                      } else {
                          warning.style.display = 'flex';
                      }
                  }
                  
                  // ==========================================
                  // TABS
                  // ==========================================
                  function switchTab(tabName, btn) {
                      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                      btn.classList.add('active');
                      document.getElementById('tab-' + tabName).classList.add('active');
                  }
                  
                  // ==========================================
                  // STATUS
                  // ==========================================
                  function showStatus(msg) {
                      const bar = document.getElementById('status-bar');
                      bar.textContent = msg;
                      bar.classList.add('show');
                      setTimeout(() => bar.classList.remove('show'), 4000);
                  }
                  
                  // ==========================================
                  // GITHUB API
                  // ==========================================
                  function getRepo() {
                      return `${siteConfig.githubUsername}/${siteConfig.repoName}`;
                  }
                  
                  async function fetchPapers() {
                      if (!ghToken) {
                          renderPapers();
                          return;
                      }
                      
                      try {
                          const res = await fetch(`https://api.github.com/repos/${getRepo()}/contents/papers.json`, {
                              headers: { 'Authorization': `token ${ghToken}` }
                          });
                          if (res.ok) {
                              const data = await res.json();
                              dbSha = data.sha;
                              papersDb = JSON.parse(b64Decode(data.content));
                          } else {
                              papersDb = [];
                          }
                      } catch (e) {
                          papersDb = [];
                      }
                      
                      updateStats();
                      renderPapers();
                  }
                  
                  async function fetchConfig() {
                      try {
                          const res = await fetch(`https://api.github.com/repos/${getRepo()}/contents/config.json`, {
                              headers: { 'Authorization': `token ${ghToken}` }
                          });
                          if (res.ok) {
                              const data = await res.json();
                              configSha = data.sha;
                              return JSON.parse(b64Decode(data.content));
                          }
                      } catch (e) {}
                      return null;
                  }
                  
                  async function savePapersToGitHub() {
                      if (!ghToken) {
                          alert('Please enter your GitHub Token in Settings first!');
                          return false;
                      }
                      
                      try {
                          const res = await fetch(`https://api.github.com/repos/${getRepo()}/contents/papers.json`, {
                              method: 'PUT',
                              headers: { 'Authorization': `token ${ghToken}` },
                              body: JSON.stringify({
                                  message: 'Update papers database',
                                  content: b64Encode(JSON.stringify(papersDb)),
                                  sha: dbSha || undefined
                              })
                          });
                          
                          if (res.ok) {
                              const data = await res.json();
                              dbSha = data.content.sha;
                              updateStats();
                              renderPapers();
                              showStatus('✅ Changes saved! Website updates in ~60 seconds.');
                              return true;
                          } else {
                              throw new Error('Save failed');
                          }
                      } catch (e) {
                          alert('Error saving: ' + e.message);
                          return false;
                      }
                  }
                  
                  async function saveConfigToGitHub(newConfig) {
                      if (!ghToken) {
                          alert('Please enter your GitHub Token first!');
                          return false;
                      }
                      
                      // Fetch current SHA
                      await fetchConfig();
                      
                      try {
                          const res = await fetch(`https://api.github.com/repos/${getRepo()}/contents/config.json`, {
                              method: 'PUT',
                              headers: { 'Authorization': `token ${ghToken}` },
                              body: JSON.stringify({
                                  message: 'Update site configuration',
                                  content: b64Encode(JSON.stringify(newConfig)),
                                  sha: configSha || undefined
                              })
                          });
                          
                          if (res.ok) {
                              const data = await res.json();
                              configSha = data.content.sha;
                              siteConfig = newConfig;
                              showStatus('✅ Settings saved! Website updates in ~60 seconds.');
                              return true;
                          } else {
                              throw new Error('Save failed');
                          }
                      } catch (e) {
                          alert('Error saving config: ' + e.message);
                          return false;
                      }
                  }
                  
                  async function uploadFileToGit(file, fileName) {
                      return new Promise((resolve, reject) => {
                          const reader = new FileReader();
                          reader.onload = async (e) => {
                              const b64 = e.target.result.split(',')[1];
                              try {
                                  const res = await fetch(`https://api.github.com/repos/${getRepo()}/contents/papers/${fileName}`, {
                                      method: 'PUT',
                                      headers: { 'Authorization': `token ${ghToken}` },
                                      body: JSON.stringify({ message: `Upload ${fileName}`, content: b64 })
                                  });
                                  if (res.ok) resolve(`papers/${fileName}`);
                                  else reject('Upload failed');
                              } catch (err) {
                                  reject(err);
                              }
                          };
                          reader.readAsDataURL(file);
                      });
                  }
                  
                  // ==========================================
                  // STATS & RENDERING
                  // ==========================================
                  function updateStats() {
                      const total = papersDb.length;
                      const live = papersDb.filter(p => p.visible !== false).length;
                      const hidden = total - live;
                      const subjects = [...new Set(papersDb.map(p => p.subject))].length;
                      
                      document.getElementById('stat-total').textContent = total;
                      document.getElementById('stat-live').textContent = live;
                      document.getElementById('stat-hidden').textContent = hidden;
                      document.getElementById('stat-subjects').textContent = subjects;
                  }
                  
                  function renderPapers() {
                      const list = document.getElementById('paper-list');
                      
                      if (papersDb.length === 0) {
                          list.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:60px; color: var(--text-muted);">No papers uploaded yet. Go to Upload tab to add your first paper!</td></tr                  function renderPapers() {
                      const list = document.getElementById('paper-list');
                      
                      if (papersDb.length === 0) {
                          list.innerHTML = `<tr><td colspan="5" style="text-align:center; padding:60px; color: var(--text-muted);">No papers uploaded yet. Go to Upload tab to add your first paper!</td></tr>`;
                          return;
                      }
                      
                      list.innerHTML = papersDb.map(p => {
                          const isLive = p.visible !== false;
                          const date = new Date(p.id).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
                          
                          return `
                              <tr style="opacity: ${isLive ? 1 : 0.6};">
                                  <td>
                                      <span class="badge ${isLive ? 'badge-live' : 'badge-hidden'}">
                                          ${isLive ? '🟢 Live' : '🔴 Hidden'}
                                      </span>
                                  </td>
                                  <td><strong style="color: var(--primary);">${p.subject}</strong></td>
                                  <td>
                                      <strong>${p.name}</strong>
                                      ${p.description ? `<br><small style="color: var(--text-muted);">${p.description.substring(0, 50)}${p.description.length > 50 ? '...' : ''}</small>` : ''}
                                  </td>
                                  <td style="color: var(--text-muted);">${date}</td>
                                  <td>
                                      <div class="action-btns">
                                          <button class="action-btn btn-outline" onclick="openEditModal(${p.id})">✏️ Edit</button>
                                          <button class="action-btn btn-success" onclick="openReplaceModal(${p.id})">🔄 PDF</button>
                                          <button class="action-btn btn-warning" onclick="toggleVisibility(${p.id})">${isLive ? '🙈 Hide' : '👁️ Show'}</button>
                                          <button class="action-btn btn-danger" onclick="deletePaper(${p.id})">🗑️</button>
                                      </div>
                                  </td>
                              </tr>
                          `;
                      }).join('');
                  }
                  
                  // ==========================================
                  // PAPER ACTIONS
                  // ==========================================
                  async function uploadNewPaper() {
                      const name = document.getElementById('new-name').value.trim();
                      const subject = document.getElementById('new-subject').value.trim();
                      const desc = document.getElementById('new-desc').value.trim();
                      const fileInput = document.getElementById('new-file');
                      const btn = document.getElementById('upload-btn');
                      
                      if (!name || !subject || !fileInput.files.length) {
                          return alert('Please fill in all required fields!');
                      }
                      
                      if (!ghToken) {
                          return alert('Please enter your GitHub Token in Settings first!');
                      }
                      
                      btn.disabled = true;
                      btn.innerHTML = '⏳ Uploading...';
                      
                      try {
                          const file = fileInput.files[0];
                          const fileName = Date.now() + '.pdf';
                          const link = await uploadFileToGit(file, fileName);
                          
                          papersDb.unshift({
                              id: Date.now(),
                              name: name,
                              subject: subject,
                              description: desc,
                              link: link,
                              visible: true
                          });
                          
                          await savePapersToGitHub();
                          
                          // Clear form
                          document.getElementById('new-name').value = '';
                          document.getElementById('new-subject').value = '';
                          document.getElementById('new-desc').value = '';
                          fileInput.value = '';
                          
                          showStatus('✅ Paper uploaded successfully!');
                          
                      } catch (e) {
                          alert('Upload failed: ' + e);
                      }
                      
                      btn.disabled = false;
                      btn.innerHTML = '🚀 Publish to Website';
                  }
                  
                  async function toggleVisibility(id) {
                      const paper = papersDb.find(p => p.id === id);
                      if (paper) {
                          paper.visible = paper.visible === false ? true : false;
                          await savePapersToGitHub();
                      }
                  }
                  
                  async function deletePaper(id) {
                      if (!confirm('⚠️ Are you sure you want to permanently delete this paper?')) return;
                      
                      papersDb = papersDb.filter(p => p.id !== id);
                      await savePapersToGitHub();
                  }
                  
                  // ==========================================
                  // EDIT MODAL
                  // ==========================================
                  function openEditModal(id) {
                      const paper = papersDb.find(p => p.id === id);
                      if (!paper) return;
                      
                      document.getElementById('edit-id').value = id;
                      document.getElementById('edit-name').value = paper.name;
                      document.getElementById('edit-subject').value = paper.subject;
                      document.getElementById('edit-desc').value = paper.description || '';
                      
                      document.getElementById('edit-modal').classList.add('show');
                  }
                  
                  async function saveEdit() {
                      const id = parseInt(document.getElementById('edit-id').value);
                      const paper = papersDb.find(p => p.id === id);
                      
                      if (paper) {
                          paper.name = document.getElementById('edit-name').value.trim();
                          paper.subject = document.getElementById('edit-subject').value.trim();
                          paper.description = document.getElementById('edit-desc').value.trim();
                          
                          await savePapersToGitHub();
                          closeModal('edit-modal');
                      }
                  }
                  
                  // ==========================================
                  // REPLACE MODAL
                  // ==========================================
                  function openReplaceModal(id) {
                      document.getElementById('replace-id').value = id;
                      document.getElementById('replace-file').value = '';
                      document.getElementById('replace-modal').classList.add('show');
                  }
                  
                  async function confirmReplace() {
                      const id = parseInt(document.getElementById('replace-id').value);
                      const fileInput = document.getElementById('replace-file');
                      const btn = document.getElementById('replace-btn');
                      
                      if (!fileInput.files.length) {
                          return alert('Please select a PDF file!');
                      }
                      
                      btn.disabled = true;
                      btn.innerHTML = '⏳ Uploading...';
                      
                      try {
                          const file = fileInput.files[0];
                          const fileName = 'replaced_' + Date.now() + '.pdf';
                          const newLink = await uploadFileToGit(file, fileName);
                          
                          const paper = papersDb.find(p => p.id === id);
                          if (paper) {
                              paper.link = newLink;
                              await savePapersToGitHub();
                          }
                          
                          closeModal('replace-modal');
                          showStatus('✅ PDF replaced successfully!');
                          
                      } catch (e) {
                          alert('Replace failed: ' + e);
                      }
                      
                      btn.disabled = false;
                      btn.innerHTML = '📤 Upload New PDF';
                  }
                  
                  function closeModal(modalId) {
                      document.getElementById(modalId).classList.remove('show');
                  }
                  
                  // Close modals on outside click
                  document.querySelectorAll('.modal').forEach(modal => {
                      modal.addEventListener('click', (e) => {
                          if (e.target === modal) {
                              modal.classList.remove('show');
                          }
                      });
                  });
                  
                  // ==========================================
                  // SETTINGS FUNCTIONS
                  // ==========================================
                  function saveGitHubSettings() {
                      const username = document.getElementById('set-gh-username').value.trim();
                      const repo = document.getElementById('set-repo-name').value.trim();
                      const token = document.getElementById('set-gh-token').value.trim();
                      
                      if (!username || !repo) {
                          return alert('Please enter GitHub username and repository name!');
                      }
                      
                      // Save token locally (not to GitHub for security)
                      if (token) {
                          localStorage.setItem('gh_token', token);
                          ghToken = token;
                      }
                      
                      // Update config
                      siteConfig.githubUsername = username;
                      siteConfig.repoName = repo;
                      
                      // Save to GitHub
                      saveConfigToGitHub(siteConfig);
                      updateTokenWarning();
                  }
                  
                  async function saveAdminCredentials() {
                      const newUsername = document.getElementById('set-admin-user').value.trim();
                      const newPassword = document.getElementById('set-admin-pass').value;
                      const confirmPassword = document.getElementById('set-admin-pass-confirm').value;
                      
                      if (!newUsername) {
                          return alert('Please enter a username!');
                      }
                      
                      if (newPassword && newPassword !== confirmPassword) {
                          return alert('Passwords do not match!');
                      }
                      
                      if (newPassword && newPassword.length < 4) {
                          return alert('Password must be at least 4 characters!');
                      }
                      
                      // Update config
                      siteConfig.adminUsername = newUsername;
                      if (newPassword) {
                          siteConfig.adminPassword = newPassword;
                      }
                      
                      const saved = await saveConfigToGitHub(siteConfig);
                      
                      if (saved) {
                          document.getElementById('admin-welcome').textContent = `Welcome, ${newUsername}!`;
                          document.getElementById('set-admin-pass').value = '';
                          document.getElementById('set-admin-pass-confirm').value = '';
                          showStatus('✅ Credentials updated! Use new credentials next login.');
                      }
                  }
                  
                  async function saveSiteSettings() {
                      const siteName = document.getElementById('set-site-name').value.trim();
                      const tagline = document.getElementById('set-site-tagline').value.trim();
                      const footer = document.getElementById('set-footer').value.trim();
                      
                      if (siteName) siteConfig.siteName = siteName;
                      if (tagline) siteConfig.siteTagline = tagline;
                      if (footer) siteConfig.footerText = footer;
                      
                      await saveConfigToGitHub(siteConfig);
                  }
                  
                  async function saveThemeColors() {
                      const primary = document.getElementById('set-primary-text').value.trim() || document.getElementById('set-primary-color').value;
                      const secondary = document.getElementById('set-secondary-text').value.trim() || document.getElementById('set-secondary-color').value;
                      
                      siteConfig.primaryColor = primary;
                      siteConfig.secondaryColor = secondary;
                      
                      await saveConfigToGitHub(siteConfig);
                  }
              </script>
          </body>
          </html>
          ADMINEOF

          # ============================================
          # CREATE papers folder placeholder
          # ============================================
          mkdir -p papers
          echo "PDF files will be stored here" > papers/.gitkeep

      - name: Commit All Files
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add .
          git commit -m "🚀 Setup Complete: Riyaaz Sir's Premium LMS" || echo "No changes to commit"
          git push

                      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1), 0 8px 10px -6px rgba(0,0,0,0.1);
                      --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #ec4899 100%);
                  }
                  
                  [data-theme="dark"] {
                      --bg: #0f172a;
                      --bg-card: rgba(30,41,59,0.8);
                      --text: #f1f5f9;

                  /* Loading Animation */
                  .loading {
                      display: flex;
                      justify-content: center;
                      align-items: center;
                      padding: 60px;
                      grid-column: 1 / -1;
                  }
                  
                  .spinner {
                      width: 50px;
                      height: 50px;
                      border: 4px solid var(--border);
                      border-top-color: var(--primary);

                  /* Animated Background */
                  .bg-animation {
                      position: fixed;
                      top: 0;
                      left: 0;
                      width: 100%;
                      height: 100%;
                      z-index: -1;
                      overflow: hidden;
                  }
                  
                  .bg-animation::before {
